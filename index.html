<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聯盟競拍系統</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyB-CA8ML-scmJLKak9Dd2U6JR50FFKkTGM",
  authDomain: "game-cd47a.firebaseapp.com",
  databaseURL: "https://game-cd47a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "game-cd47a",
  storageBucket: "game-cd47a.firebasestorage.app",
  messagingSenderId: "945929007516",
  appId: "1:945929007516:web:4363867cd435f361265859"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_REF = 'guild_auction/state';
let _saveTs = 0;
window._fbSave = async (data) => {
  _saveTs = Date.now();
  await set(ref(db, DB_REF), { ...data, _ts: _saveTs });
};
window._fbListen = (cb) => {
  onValue(ref(db, DB_REF), snap => {
    const v = snap.val();
    if (!v) return;
    cb(v);
  });
};
window._fbReady = true;
document.dispatchEvent(new Event('fb-ready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root {
  --bg:#f5f0e8;--panel:#fffdf7;--card:#fff9ee;--border:#d4c9a8;
  --gold:#c8860a;--gold-bg:#fef3d0;--gold-bd:#e6b84a;
  --purple:#5b3fa0;--purple-bg:#ede8fa;--purple-bd:#9b7ee0;
  --green:#2d7a3a;--green-bg:#e6f5e9;--green-bd:#6abf76;
  --red:#b83232;--red-bg:#fdeaea;--red-bd:#e57a7a;
  --orange:#c05e10;--orange-bg:#fef0e0;--orange-bd:#e8a060;
  --blue:#1a5fa0;--blue-bg:#e6f0fa;--blue-bd:#6aaae0;
  --text:#2a2010;--text2:#5a4a2a;--text3:#8a7a5a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none}
.top-bar{background:linear-gradient(135deg,#3a2808,#6b3e10);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.top-bar h1{color:#f5d070;font-size:1rem;font-weight:900;letter-spacing:1px}
.sync-wrap{margin-left:auto;display:flex;align-items:center;gap:6px}
.sync-lbl{font-size:.68rem;color:#c4a060}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0}
.sync-dot.on{background:#5dbb6a;animation:pulse 2.5s infinite}
.sync-dot.ing{background:#f0b429}
.sync-dot.err{background:#e85a5a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.ses-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.ses-bar input[type=date]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:.78rem;font-family:inherit}
.ses-tag{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text3);font-family:inherit;transition:all .15s}
.ses-tag.noon{background:#fff3e0;color:#b05010;border-color:#e8a060}
.ses-tag.evening{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}
.ses-tag.king{background:#e8f5e9;color:#2d7a3a;border-color:#6abf76}
.main-tabs{display:flex;background:#2a1800;border-bottom:2px solid #6b3e10;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:48px;z-index:90}
.main-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 16px;font-size:.82rem;font-weight:700;color:#8a6a40;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:#f5d070;border-bottom-color:#f5d070}
.page{display:none;padding:12px 14px 30px}
.page.active{display:block}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(100,80,20,.08)}
.card-title{font-size:.8rem;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;min-height:40px;touch-action:manipulation}
.btn-gold{background:linear-gradient(135deg,#c8860a,#e8a020);color:#fff}
.btn-gold:active{transform:scale(.97)}
.btn-purple{background:linear-gradient(135deg,#5b3fa0,#7c5cc8);color:#fff}
.btn-green{background:linear-gradient(135deg,#2d7a3a,#3a9e4a);color:#fff}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-gray{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:.75rem;min-height:32px}
.btn-full{width:100%}
/* INPUTS */
input[type=text],input[type=number],select,textarea{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:.82rem;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-bd)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.cb-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.8rem;color:var(--orange)}
.cb-row input[type=checkbox]{accent-color:var(--orange);width:16px;height:16px}
/* PILL */
.pill{font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:10px;display:inline-block}
.pill-cd{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.pill-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.pill-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.pill-remain{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.pill-full{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
/* LOOT GRID */
.loot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.loot-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all .12s;min-height:64px;display:flex;flex-direction:column;touch-action:manipulation}
.loot-card:active{transform:scale(.97)}
.loot-card.selected{border-color:var(--gold-bd);background:var(--gold-bg);box-shadow:0 0 0 2px rgba(200,134,10,.2)}
.loot-card.full{border-color:var(--red-bd);background:var(--red-bg);opacity:.7}
.loot-card.purple-item{border-left:4px solid var(--purple)}
.loot-card.cd-item{border-left:4px solid var(--orange)}
.loot-card.purple-item.cd-item{border-left:4px solid var(--purple)}
.loot-name{font-weight:900;font-size:.9rem}
.loot-meta{display:flex;gap:4px;align-items:center;margin-top:5px;flex-wrap:wrap}
/* MEMBER GRID */
.member-search{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;margin-bottom:10px}
.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.member-chip{padding:7px 4px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;font-size:.72rem;cursor:pointer;text-align:center;transition:all .12s;position:relative;word-break:break-all;line-height:1.3;min-height:36px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.member-chip:active{transform:scale(.96)}
.member-chip.has-bid{border-color:var(--green-bd);background:var(--green-bg)}
.member-chip.has-cd{border-color:var(--orange-bd)}
.bid-count{position:absolute;top:1px;right:3px;font-size:.58rem;color:var(--gold);font-weight:900}
/* OUTPUT */
.output-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:.82rem;line-height:1.8;color:var(--text);word-break:break-all;white-space:pre-wrap;min-height:50px;margin-bottom:8px}
.copy-btn{width:100%;padding:9px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.copy-btn.copied{background:var(--blue)}
.copy-btn:active{transform:scale(.98)}
.sec-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;margin-top:12px;padding-bottom:4px;border-bottom:1px solid var(--border)}
/* NOTICE */
.notice{background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:8px;padding:8px 12px;font-size:.78rem;color:var(--gold);margin-bottom:10px;line-height:1.6}
.notice.info{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.notice.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
/* BID LOG */
.bid-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;font-size:.8rem}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;min-width:28px;min-height:28px}
.del-btn:active{color:var(--red)}
/* CD ROW */
.cd-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.cd-row.active{border-left:3px solid var(--orange)}
.cd-row.done{border-left:3px solid var(--green);opacity:.65}
.cd-days{font-weight:900;font-size:1rem;color:var(--orange)}
.cd-days.done{color:var(--green);font-size:.8rem;font-weight:700}
/* SETTINGS */
.settings-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.settings-label{font-size:.78rem;color:var(--text2);min-width:50px;flex-shrink:0}
.manage-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.manage-row:last-child{border-bottom:none}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--panel);border-radius:16px 16px 0 0;padding:20px 18px 36px;width:100%;max-width:500px;box-shadow:0 -8px 30px rgba(0,0,0,.2);animation:slideUp .2s ease-out}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:1rem;font-weight:900;color:var(--gold);margin-bottom:14px}
.modal-info{font-size:.85rem;color:var(--text2);line-height:1.9;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
/* PRIORITY LIST */
.priority-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.priority-title{font-size:.78rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.member-chips-wrap{display:flex;flex-wrap:wrap;gap:5px}
.m-chip{padding:3px 8px;border-radius:6px;font-size:.72rem;font-weight:700}
.m-chip.r1{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-bd)}
.m-chip.r2{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.m-chip.r3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
/* TOGGLE ROW */
.toggle-row{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:10px;flex-wrap:wrap}
.toggle-row label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.75rem;color:var(--text2)}
/* EMPTY */
.empty{text-align:center;padding:24px 16px;color:var(--text3);font-size:.85rem}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>⚔️ 聯盟競拍系統</h1>
  <div class="sync-wrap">
    <span class="sync-lbl" id="syncLbl">連線中...</span>
    <div class="sync-dot ing" id="syncDot"></div>
  </div>
</div>

<div class="ses-bar">
  <div style="display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:3px 6px;">
    <button onclick="shiftDate(-1)" style="background:none;border:none;font-size:1.1rem;cursor:pointer;padding:2px 6px;color:var(--text2);line-height:1">‹</button>
    <span id="sessionDateDisplay" style="font-size:.82rem;font-weight:700;color:var(--text);min-width:72px;text-align:center"></span>
    <button onclick="shiftDate(1)" style="background:none;border:none;font-size:1.1rem;cursor:pointer;padding:2px 6px;color:var(--text2);line-height:1">›</button>
    <button onclick="resetToToday()" style="background:none;border:none;font-size:.65rem;cursor:pointer;padding:2px 5px;color:var(--text3);border-left:1px solid var(--border);margin-left:2px">今天</button>
  </div>
  <button class="ses-tag" id="btnNoon" onclick="setSession('noon')">☀️ 中午場</button>
  <button class="ses-tag" id="btnEvening" onclick="setSession('evening')">🌙 晚上場</button>
  <button class="ses-tag" id="btnKing" onclick="setSession('king')">👑 聯盟王</button>
  <span id="sesInfo" style="font-size:.72rem;color:var(--text3);margin-left:auto;"></span>
</div>

<div class="main-tabs">
  <button class="tab-btn active" id="t0" onclick="gotoTab(0)">🎁 競標</button>
  <button class="tab-btn" id="t1" onclick="gotoTab(1)">📋 紀錄</button>
  <button class="tab-btn" id="t2" onclick="gotoTab(2)">⏳ CD</button>
  <button class="tab-btn" id="t3" onclick="gotoTab(3)">⚙️ 設定</button>
</div>

<!-- PAGE 0: 競標 -->
<div class="page active" id="p0">
  <!-- 筆記 -->
  <div class="card">
    <div class="card-title">📝 共用筆記</div>
    <textarea id="notesArea" rows="3" style="resize:vertical;line-height:1.6" placeholder="競標注意事項、公告..." oninput="saveNotes()"></textarea>
  </div>

  <!-- 貼上解析 -->
  <div class="card">
    <div class="card-title">📋 貼上戰利品統計</div>
    <textarea id="pasteInput" rows="3" style="width:100%;resize:vertical;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:.85rem;font-family:inherit;color:var(--text);line-height:1.6" placeholder="黑龍 3。紅三 1。紅二 5。射手 7。食人魔 5。刺客 6。地精 2。紅一 11。"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-gold" style="flex:1" onclick="parseLoot()">✦ 解析戰利品</button>
      <button class="btn btn-gray btn-sm" onclick="clearLoot()">清除</button>
    </div>
  </div>

  <!-- 競標區（解析後顯示） -->
  <div id="lootSection" style="display:none">
    <!-- 本場登記 -->
    <div class="notice" id="selHint">← 點選下方戰利品，再選成員登記競標</div>
    <div class="loot-grid" id="lootGrid"></div>

    <div class="card" style="margin-top:10px">
      <div class="card-title" style="justify-content:space-between">
        <span>👥 選擇成員</span>
        <div style="display:flex;gap:8px">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.72rem;color:var(--text2);font-weight:400">
            <input type="radio" name="mDisp" value="short" checked onchange="renderMemberGrid()"> 簡稱
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.72rem;color:var(--text2);font-weight:400">
            <input type="radio" name="mDisp" value="full" onchange="renderMemberGrid()"> 全名
          </label>
        </div>
      </div>
      <input type="text" class="member-search" id="memberSearch" placeholder="搜尋成員..." oninput="renderMemberGrid()">
      <div class="member-grid" id="memberGrid"></div>
    </div>
  </div>

  <!-- 場次結果（隨日期/場次切換） -->
  <div id="sessionResults"></div>

  <!-- CD解禁（固定顯示，不受場次切換影響） -->
  <div id="cdSection"></div>
</div>

<!-- PAGE 1: 紀錄（三場總結果） -->
<div class="page" id="p1">
  <div class="card">
    <div class="card-title">📋 三場競標總結果</div>
    <div class="toggle-row">
      <span style="font-size:.75rem;color:var(--text2);">名稱格式：</span>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.78rem">
        <input type="radio" name="outFmt" value="short" checked onchange="renderLog()"> 簡稱
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.78rem">
        <input type="radio" name="outFmt" value="full" onchange="renderLog()"> 全名
      </label>
    </div>
    <div id="logContent"></div>
  </div>
</div>

<!-- PAGE 2: CD -->
<div class="page" id="p2"><div id="cdContent"></div></div>

<!-- PAGE 3: 設定 -->
<div class="page" id="p3">
  <div class="card">
    <div class="card-title">🗂 場次管理</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-red btn-sm" onclick="clearSessionBids('noon')">🗑 清除中午場</button>
      <button class="btn btn-red btn-sm" onclick="clearSessionBids('evening')">🗑 清除晚上場</button>
      <button class="btn btn-red btn-sm" onclick="clearSessionBids('king')">🗑 清除聯盟王</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-gray btn-sm" onclick="clearSession()">↩ 重置場次（保留設定）</button>
      <button class="btn btn-gray btn-sm" style="color:var(--red)" onclick="resetAll()">⚠️ 完全重置</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎁 戰利品資料庫 <span style="color:var(--green);font-weight:400;font-size:.7rem">永久保存</span></div>
    <div class="notice" style="font-size:.75rem">設定一次永久保留，不會因清除場次而消失。貼上統計時自動對照此資料庫。<br>🟣 紫色（限1顆）　🔵 藍色（最多2顆）</div>
    <div class="settings-row"><input type="text" id="niName" placeholder="完整名稱（如：嘲顱獸人射手）"></div>
    <div class="settings-row">
      <input type="text" id="niShort" placeholder="簡稱（如：射手）" style="flex:1">
      <select id="niTier" style="flex:1">
        <option value="blue">🔵 藍色</option>
        <option value="purple">🟣 紫色</option>
      </select>
    </div>
    <div class="settings-row">
      <label class="cb-row"><input type="checkbox" id="niCD" onchange="toggleNiCD()"> CD冷卻</label>
      <input type="number" id="niCDDays" value="3" min="1" max="30" style="width:60px;display:none;flex:none">
      <span id="niCDHint" style="display:none;font-size:.72rem;color:var(--orange);flex:none">天</span>
    </div>
    <button class="btn btn-gold btn-full" onclick="addItem()" style="margin-top:4px">新增至資料庫</button>
    <div style="margin-top:12px" id="itemManageList"></div>
  </div>

  <div class="card">
    <div class="card-title">👥 群組管理 <span style="color:var(--text3);font-weight:400;font-size:.72rem">決定各群組CD天數</span></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="ngName" placeholder="群組名稱" style="flex:2" onkeydown="if(event.key==='Enter')addGroup()">
      <input type="number" id="ngCD" value="3" min="1" max="30" style="width:58px;flex:none" placeholder="CD天">
      <button class="btn btn-gold btn-sm" onclick="addGroup()">新增</button>
    </div>
    <div id="groupManageList"></div>
  </div>

  <div class="card">
    <div class="card-title">👥 成員管理 <span id="memberCountBadge" style="color:var(--text3);font-weight:400;font-size:.72rem"></span></div>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <input type="text" id="nmName" placeholder="成員名稱（全名）" style="flex:2" onkeydown="if(event.key==='Enter')addMember()">

<script>
// ===== ALIASES (static fallback) =====
const STATIC_ALIASES = {
  '狂煞黑龍':'黑龍','黑龍':'黑龍',
  '紅葉紋章自選箱iii':'紅三','紅葉紋章自選箱3':'紅三','紅三自選箱':'紅三','紅三':'紅三',
  '紅葉紋章自選箱ii':'紅二','紅葉紋章自選箱2':'紅二','紅二自選箱':'紅二','紅二':'紅二',
  '紅葉紋章自選箱i':'紅一','紅葉紋章自選箱1':'紅一','紅一自選箱':'紅一','紅一':'紅一',
  '水元素':'水元素','火元素':'火元素',
  '狂煞暴龍':'狂暴','狂暴':'狂暴','狂爆':'狂暴',
  '狂煞叢林之魂':'叢林','叢林':'叢林',
  '嘲顱獸人射手':'射手','射手':'射手',
  '嘲顱獸人護衛':'護衛','獸人護衛':'護衛','護衛':'護衛',
  '骷髏刺客':'刺客','刺客':'刺客','骷髏':'刺客',
  '地精伐木機':'地精','地精':'地精','食人魔':'食人魔',
};
const CD_DEFAULTS = new Set(['黑龍','紅三']);
const PURPLE_DEFAULTS = new Set(['黑龍','紅三']);

// ===== STATE =====
let S = {
  itemDB: [],
  items: [],          // current session+date items (synced by syncSessionItems)
  sessionItems: {},   // {date: {noon:[], evening:[], king:[]}}
  pasteTexts: {},     // {date: {noon:'', evening:'', king:''}}
  members: [],
  bids: [],
  session: null,
  groups: [],
  notes: '',
};

let selectedItemId = null;
let pendingBid = null;
let currentTab = 0;
let viewSession = null; // which session to view on page 0
let fbReady = false;
let lastSaveTime = 0;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

// ===== NAME HELPERS =====
function mName(m, mode) {
  if (mode === 'short') return (m.shortName && m.shortName !== m.name) ? m.shortName : m.name;
  const radio = mode === 'output'
    ? document.querySelector('input[name="outFmt"]:checked')?.value
    : document.querySelector('input[name="mDisp"]:checked')?.value;
  // default to short if radio not found (e.g. on different tab)
  const useShort = !radio || radio !== 'full';
  return useShort && m.shortName && m.shortName.trim() && m.shortName !== m.name ? m.shortName : m.name;
}

function iName(item, mode) {
  const radio = document.querySelector('input[name="outFmt"]:checked')?.value;
  const useShort = (mode === 'output') ? radio !== 'full' : true;
  return useShort && item.shortName && item.shortName !== item.name ? item.shortName : item.name;
}

function getMember(id) { return S.members.find(m => m.id === id); }

// ===== CD CALCULATION =====
function effectiveCDDays(bid) {
  const member = getMember(bid.memberId);
  const itemDays = bid.cdDays || 3;
  if (member && member.groupId) {
    const grp = S.groups.find(g => g.id === member.groupId);
    if (grp) return Math.min(grp.cdDays, itemDays);
  }
  return itemDays;
}

function cdDaysLeft(bid) {
  const d = new Date(bid.date); d.setHours(0,0,0,0);
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.max(0, effectiveCDDays(bid) - Math.floor((n - d) / 86400000));
}

function unlockDate(bid) {
  const d = new Date(bid.date);
  d.setDate(d.getDate() + effectiveCDDays(bid));
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ===== FIREBASE =====
function setSyncUI(s) {
  document.getElementById('syncDot').className = 'sync-dot ' + (s==='on'?'on':s==='ing'?'ing':'err');
  document.getElementById('syncLbl').textContent = s==='on'?'已連線':s==='ing'?'同步中...':'離線';
}

function initFirebase() {
  if (window._fbReady) startFB();
  else {
    document.addEventListener('fb-ready', startFB, {once:true});
    setTimeout(() => { if (!fbReady) setSyncUI('err'); }, 4000);
  }
}

function startFB() {
  fbReady = true;
  setSyncUI('ing');
  let firstLoad = true;
  window._fbListen(remoteData => {
    const remoteTs = remoteData._ts || 0;
    // Always merge on first load (to get existing Firebase data)
    if (firstLoad) {
      firstLoad = false;
      mergeRemote(remoteData);
      setSyncUI('on');
      return;
    }
    // After first load: ignore echo within 5 seconds of our own save
    if (Date.now() - lastSaveTime < 5000) {
      setSyncUI('on');
      return;
    }
    if (remoteTs > lastSaveTime) {
      mergeRemote(remoteData);
    }
    setSyncUI('on');
  });
}

function getDateSesKey(date, ses) { return `${date}__${ses}`; }

function syncSessionItems() {
  const ses = viewSession || S.session || 'noon';
  const date = selectedDate;
  const key = getDateSesKey(date, ses);
  S.items = S.sessionItems[key] || [];
}

function mergeRemote(data) {
  if (data.itemDB !== undefined) S.itemDB = data.itemDB || [];
  if (data.sessionItems !== undefined) S.sessionItems = data.sessionItems || {};
  // legacy migration: old flat {noon:[],evening:[],king:[]} structure
  else if (data.items !== undefined) {
    const ses = data.session || 'noon';
    const date = new Date().toISOString().split('T')[0];
    S.sessionItems[getDateSesKey(date, ses)] = data.items || [];
  }
  if (data.pasteTexts !== undefined) S.pasteTexts = data.pasteTexts || {};
  if (data.bids !== undefined) S.bids = data.bids || [];
  if (data.session !== undefined) S.session = data.session;
  if (data.members !== undefined) S.members = data.members || [];
  if (data.groups !== undefined) S.groups = data.groups || [];
  if (data.notes !== undefined) S.notes = data.notes || '';
  syncSessionItems();
  renderAll();
}

let saveDebounce = null;
function save() {
  syncSessionItems();
  localStorage.setItem('ga', JSON.stringify(S));
  if (!fbReady) return;
  if (saveDebounce) clearTimeout(saveDebounce);
  saveDebounce = setTimeout(async () => {
    setSyncUI('ing');
    try {
      lastSaveTime = Date.now();
      await window._fbSave({
        itemDB:S.itemDB, sessionItems:S.sessionItems, pasteTexts:S.pasteTexts,
        bids:S.bids, session:S.session, members:S.members, groups:S.groups, notes:S.notes
      });
      setSyncUI('on');
    } catch(e) { setSyncUI('err'); }
  }, 600);
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('ga');
    if (!raw) return;
    const d = JSON.parse(raw);
    const today = new Date().toISOString().split('T')[0];
    if (d.itemDB !== undefined) S.itemDB = d.itemDB || [];
    if (d.sessionItems !== undefined) {
      if (Array.isArray(d.sessionItems.noon) || Array.isArray(d.sessionItems.evening)) {
        S.sessionItems = {};
        ['noon','evening','king'].forEach(ses => {
          if (d.sessionItems[ses]?.length) S.sessionItems[getDateSesKey(today,ses)] = d.sessionItems[ses];
        });
      } else {
        S.sessionItems = d.sessionItems || {};
      }
    }
    if (d.pasteTexts !== undefined) {
      if (typeof d.pasteTexts.noon === 'string') {
        S.pasteTexts = {};
        ['noon','evening','king'].forEach(ses => {
          if (d.pasteTexts[ses]) S.pasteTexts[getDateSesKey(today,ses)] = d.pasteTexts[ses];
        });
      } else {
        S.pasteTexts = d.pasteTexts || {};
      }
    }
    if (d.bids !== undefined) S.bids = d.bids || [];
    if (d.session) S.session = d.session;
    if (d.members !== undefined) S.members = d.members || [];
    if (d.groups !== undefined) S.groups = d.groups || [];
    if (d.notes !== undefined) S.notes = d.notes || '';
    syncSessionItems();
  } catch(e) {}
}

// ===== DATE =====
let selectedDate = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

function getSelectedDate() { return selectedDate; }

function formatDateDisplay(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
}

function setSelectedDate(d) {
  selectedDate = d;
  const dispEl = document.getElementById('sessionDateDisplay');
  if (dispEl) dispEl.textContent = formatDateDisplay(d);
  const modalDateEl = document.getElementById('modalDate');
  if (modalDateEl) modalDateEl.value = d;
  // Sync items and paste text for new date
  syncSessionItems();
  const ses = viewSession || S.session || 'noon';
  const key = getDateSesKey(d, ses);
  const pasteEl = document.getElementById('pasteInput');
  if (pasteEl) pasteEl.value = S.pasteTexts[key] || '';
  const hasSesItems = (S.sessionItems[key]||[]).length > 0;
  document.getElementById('lootSection').style.display = hasSesItems ? '' : 'none';
  renderLootGrid();
  renderMemberGrid();
  renderSessionResults();
  renderCDSection();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
}

function shiftDate(days) {
  const parts = selectedDate.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  d.setDate(d.getDate() + days);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  setSelectedDate(`${y}-${m}-${day}`);
}

function resetToToday() {
  const n = new Date();
  const y = n.getFullYear();
  const m = String(n.getMonth()+1).padStart(2,'0');
  const day = String(n.getDate()).padStart(2,'0');
  setSelectedDate(`${y}-${m}-${day}`);
}

// ===== INIT =====
document.getElementById('modalDate').value = selectedDate;
document.getElementById('sessionDateDisplay').textContent = formatDateDisplay(selectedDate);
loadLocal();
renderAll();
initFirebase();

// ===== SESSION =====
function updateSessionUI(s) {
  // Pure UI update, no save
  ['noon','evening','king'].forEach(x => {
    const map = {noon:'btnNoon',evening:'btnEvening',king:'btnKing'};
    document.getElementById(map[x]).className = 'ses-tag' + (s===x ? ' '+x : '');
  });
  const labels = {noon:'☀️ 中午場',evening:'🌙 晚上場',king:'👑 聯盟王'};
  document.getElementById('sesInfo').textContent = labels[s]||'';
  const modalSes = document.getElementById('modalSes');
  if (modalSes) modalSes.value = s;
}

function setSession(s) {
  S.session = s;
  updateSessionUI(s);
  viewSession = s;
  syncSessionItems();
  const key = getDateSesKey(selectedDate, s);
  const pasteEl = document.getElementById('pasteInput');
  if (pasteEl) pasteEl.value = S.pasteTexts[key] || '';
  const hasSesItems = (S.sessionItems[key]||[]).length > 0;
  document.getElementById('lootSection').style.display = hasSesItems ? '' : 'none';
  renderLootGrid();
  renderMemberGrid();
  renderSessionResults();
  save();
}

function setViewSession(s) {
  viewSession = s;
  renderSessionResults();
  renderLootGrid();
}

// ===== TABS =====
function gotoTab(n) {
  currentTab = n;
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===n));
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===n));
  if (n===1) renderLog();
  if (n===2) renderCD();
  if (n===3) renderSettings();
}

// ===== PARSE =====
function buildAliases() {
  const map = {};
  S.itemDB.forEach(item => {
    const s = item.shortName || item.name;
    [item.name, item.name.toLowerCase().replace(/\s/g,''), s, s.toLowerCase().replace(/\s/g,'')]
      .forEach(k => { map[k] = s; });
  });
  return map;
}

function resolveAlias(raw) {
  const dyn = buildAliases();
  const k = raw.toLowerCase().replace(/\s/g,'');
  return dyn[k] || dyn[raw] || STATIC_ALIASES[k] || STATIC_ALIASES[raw] || raw;
}

function parseLoot() {
  const raw = document.getElementById('pasteInput').value.trim();
  if (!raw) { alert('請先貼上戰利品統計文字'); return; }
  const regex = /([^\d\s。．，,、;\n：:＝=]+?)\s*[：:＝=]?\s*(\d+)/g;
  const found = []; let m;
  while ((m = regex.exec(raw)) !== null) {
    const rn = m[1].trim().replace(/[。．，,、;]/g,'');
    const qty = parseInt(m[2]);
    if (!rn || !qty || qty > 99) continue;
    const canonical = resolveAlias(rn);
    const ex = found.find(f => f.name === canonical);
    if (ex) ex.qty = qty; else found.push({name:canonical, qty, raw:rn});
  }
  if (!found.length) { alert('無法解析，請確認格式如：黑龍 3。紅三 1。'); return; }
  found.forEach(f => {
    const dbEntry = S.itemDB.find(i => i.name===f.name || i.shortName===f.name);
    const exItem = S.items.find(i => i.dbId===(dbEntry?.id) || i.name===f.name);
    if (exItem) { exItem.qty = f.qty; }
    else if (dbEntry) {
      S.items.push({id:uid(), dbId:dbEntry.id, name:dbEntry.name, shortName:dbEntry.shortName||dbEntry.name,
        tier:dbEntry.tier, perMemberLimit:dbEntry.perMemberLimit, hasCD:dbEntry.hasCD, cdDays:dbEntry.cdDays, qty:f.qty});
    } else {
      const isPurple = PURPLE_DEFAULTS.has(f.name);
      S.items.push({id:uid(), dbId:null, name:f.name, shortName:f.raw||f.name,
        tier:isPurple?'purple':'blue', perMemberLimit:isPurple?1:2,
        hasCD:CD_DEFAULTS.has(f.name), cdDays:3, qty:f.qty});
    }
  });
  const ses = viewSession || S.session || 'noon';
  const date = selectedDate;
  const key = getDateSesKey(date, ses);
  S.sessionItems[key] = S.items;
  S.pasteTexts[key] = raw;
  save();
  document.getElementById('lootSection').style.display = '';
  if (!viewSession) viewSession = ses;
  renderLootGrid();
  renderMemberGrid();
  renderSessionResults();
}

function clearLoot() {
  const ses = viewSession || S.session || 'noon';
  const key = getDateSesKey(selectedDate, ses);
  document.getElementById('pasteInput').value = '';
  S.pasteTexts[key] = '';
  document.getElementById('lootSection').style.display = 'none';
  S.sessionItems[key] = [];
  S.items = [];
  selectedItemId = null;
  save(); renderLootGrid(); renderSessionResults();
}

// ===== LOOT GRID =====
function renderLootGrid() {
  const el = document.getElementById('lootGrid');
  if (!S.items.length) { el.innerHTML=''; return; }
  const ses = viewSession || S.session || 'noon';
  const date = selectedDate;
  el.innerHTML = S.items.map(item => {
    // Only count bids for THIS session and THIS date
    const sesBids = S.bids.filter(b => b.itemId===item.id && b.session===ses && b.date===date);
    const claimed = sesBids.length;
    const rem = item.qty - claimed;
    const full = rem <= 0;
    const sel = selectedItemId === item.id;
    const tier = item.tier||'blue';
    const dot = tier==='purple'?'🟣':'🔵';
    const limit = item.perMemberLimit||(tier==='purple'?1:2);
    return `<div class="loot-card ${sel?'selected':''} ${full?'full':''} ${item.hasCD?'cd-item':''} ${tier==='purple'?'purple-item':''}"
      onclick="selectLoot('${item.id}')">
      <div class="loot-name">${dot} ${item.name}</div>
      <div class="loot-meta">
        ${item.hasCD?`<span class="pill pill-cd">CD ${item.cdDays||3}天</span>`:''}
        <span class="pill ${full?'pill-full':'pill-remain'}">${full?'已滿':rem+'/'+item.qty}</span>
        <span class="pill" style="background:#f0f0f0;color:#888;font-size:.58rem">限${limit}</span>
      </div>
    </div>`;
  }).join('');
  updateSelHint();
}

function selectLoot(id) {
  selectedItemId = selectedItemId===id ? null : id;
  renderLootGrid(); renderMemberGrid();
}

function updateSelHint() {
  const hint = document.getElementById('selHint');
  if (!hint) return;
  if (!selectedItemId) { hint.innerHTML='← 點選上方戰利品，再選成員登記競標'; return; }
  const item = S.items.find(i=>i.id===selectedItemId);
  if (!item) return;
  const ses = viewSession || S.session || 'noon';
  const claimed = S.bids.filter(b=>b.itemId===selectedItemId && b.session===ses && b.date===selectedDate).length;
  const rem = item.qty - claimed;
  hint.innerHTML = `已選：<strong>${item.name}</strong>　剩：<strong style="color:${rem>0?'var(--green)':'var(--red)'}">${rem}/${item.qty}</strong>　⬇️ 點成員`;
}

// ===== MEMBER GRID =====
function renderMemberGrid() {
  const search = (document.getElementById('memberSearch')?.value||'').toLowerCase();
  const grid = document.getElementById('memberGrid');
  if (!grid) return;
  const ses = viewSession || S.session || 'noon';
  const date = selectedDate;
  const filtered = S.members.filter(m =>
    m.name.toLowerCase().includes(search) ||
    (m.shortName && m.shortName.toLowerCase().includes(search))
  );
  grid.innerHTML = filtered.map(m => {
    const bc = S.bids.filter(b=>b.memberId===m.id && b.session===ses && b.date===date).length;
    const hc = S.bids.some(b=>b.memberId===m.id && b.hasCD);
    return `<div class="member-chip ${bc>0?'has-bid':''} ${hc?'has-cd':''}" onclick="memberClick('${m.id}')">
      ${bc>0?`<span class="bid-count">${bc}</span>`:''}${mName(m,'display')}
    </div>`;
  }).join('');
}

function memberClick(mid) {
  if (!selectedItemId) { alert('請先點選上方的戰利品！'); return; }
  const item = S.items.find(i=>i.id===selectedItemId);
  const member = getMember(mid);
  if (!item||!member) return;
  const ses = viewSession || S.session || 'noon';
  const date = selectedDate;
  // Only count bids for current session+date
  const totalClaimed = S.bids.filter(b=>b.itemId===item.id && b.session===ses && b.date===date).length;
  if (totalClaimed>=item.qty) { alert(`「${item.name}」已全部競標完畢！`); return; }
  const limit = item.perMemberLimit||(item.tier==='purple'?1:2);
  const memberItemBids = S.bids.filter(b=>b.memberId===mid&&b.itemId===item.id&&b.session===ses&&b.date===date).length;
  if (memberItemBids>=limit) { alert(`${member.name} 對「${item.name}」已達上限（${limit}顆）`); return; }
  const tier = item.tier||'blue';
  const tierLimit = tier==='purple'?1:2;
  const tierIds = S.items.filter(i=>(i.tier||'blue')===tier).map(i=>i.id);
  const tierCount = S.bids.filter(b=>b.memberId===mid&&tierIds.includes(b.itemId)&&b.session===ses&&b.date===date).length;
  if (tierCount>=tierLimit) {
    alert(`${member.name} 的${tier==='purple'?'紫色':'藍色'}競標已達上限（${tierLimit}顆）`); return;
  }
  pendingBid = {memberId:mid, itemId:selectedItemId};
  const grp = member.groupId ? S.groups.find(g=>g.id===member.groupId) : null;
  const grpInfo = grp ? `<br><span style="color:var(--purple);font-size:.72rem;">群組：${grp.name}（CD ${grp.cdDays}天）</span>` : '';
  const tierBadge = tier==='purple'
    ? '<span class="pill pill-purple" style="font-size:.68rem">🟣 紫色</span>'
    : '<span class="pill pill-blue" style="font-size:.68rem">🔵 藍色</span>';
  document.getElementById('modalInfo').innerHTML =
    `成員：<strong>${member.name}</strong>${grpInfo}<br>物品：<strong style="color:var(--gold)">${item.name}</strong> ${tierBadge}${item.hasCD?'&nbsp;<span style="color:var(--orange);font-size:.72rem">⏳ CD</span>':''}<br><span style="font-size:.72rem;color:var(--text3)">本場已標 ${tier==='purple'?'紫':'藍'}色：${tierCount}/${tierLimit}顆</span>`;
  document.getElementById('modalDate').value = getSelectedDate();
  // ses already declared above, reuse it
  document.getElementById('modalSes').value = ses;
  const sesLabels = {noon:'☀️ 中午場', evening:'🌙 晚上場', king:'👑 聯盟王拍賣'};
  document.getElementById('modalSesDisplay').textContent = sesLabels[ses]||ses;
  document.getElementById('bidModal').style.display = 'flex';
}

function closeModal() { document.getElementById('bidModal').style.display='none'; pendingBid=null; }

function confirmBid() {
  if (!pendingBid) return;
  const item = S.items.find(i=>i.id===pendingBid.itemId);
  if (!item) { closeModal(); return; }
  S.bids.push({
    id:uid(), memberId:pendingBid.memberId, itemId:pendingBid.itemId,
    itemName: item.name,           // store for historical display
    itemShort: item.shortName||item.name,
    session:document.getElementById('modalSes').value,
    date:document.getElementById('modalDate').value,
    hasCD:item.hasCD||false, cdDays:item.cdDays||3, ts:Date.now()
  });
  closeModal(); save();
  renderLootGrid(); renderMemberGrid(); renderSessionResults();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
}

function removeBid(id) {
  S.bids = S.bids.filter(b=>b.id!==id);
  save();
  renderLootGrid(); renderMemberGrid(); renderSessionResults();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
  if (currentTab===3) renderSettings();
}

// ===== SESSION RESULTS (page 0 bottom) =====
function renderSessionResults() {
  const el = document.getElementById('sessionResults');
  if (!el) return;
  const ses = viewSession || S.session || 'noon';
  const selDate = getSelectedDate();
  const sesBids = S.bids.filter(b => b.session===ses && b.date===selDate);
  const sesLabel = ses==='noon'?'☀️ 中午場':ses==='evening'?'🌙 晚上場':'👑 聯盟王';
  const dateLabel = selDate.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3');

  // Helper: find item name from all sources
  function findItemName(itemId, bid) {
    if (bid && bid.itemShort && bid.itemShort !== '?') return bid.itemShort;
    if (bid && bid.itemName && bid.itemName !== '?') return bid.itemName;
    // Search current session items
    const si = S.items.find(i=>i.id===itemId);
    if (si) return si.shortName||si.name;
    // Search all sessionItems keys
    for (const key of Object.keys(S.sessionItems)) {
      const fi = (S.sessionItems[key]||[]).find(i=>i.id===itemId);
      if (fi) return fi.shortName||fi.name;
    }
    // Search itemDB directly (item might reference dbId)
    const di = S.itemDB.find(i=>i.id===itemId);
    if (di) return di.shortName||di.name;
    // Search itemDB by dbId cross-reference through sessionItems
    for (const key of Object.keys(S.sessionItems)) {
      const si2 = (S.sessionItems[key]||[]).find(i=>i.id===itemId);
      if (si2 && si2.dbId) {
        const db = S.itemDB.find(d=>d.id===si2.dbId);
        if (db) return db.shortName||db.name;
      }
    }
    return '?';
  }

  let html = '';

  // --- Already bid list ---
  html += `<div class="card"><div class="card-title">✅ 已競標 <span style="font-size:.75rem;color:var(--text3);font-weight:400">${sesLabel} · ${dateLabel}</span></div>`;
  if (!sesBids.length) {
    html += `<div class="empty">${dateLabel} 無競標紀錄</div>`;
  } else {
    const byItem = {};
    sesBids.forEach(b => {
      if (!byItem[b.itemId]) byItem[b.itemId] = [];
      byItem[b.itemId].push(b);
    });
    Object.entries(byItem).forEach(([itemId, bids]) => {
      bids.sort((a,b)=>a.ts-b.ts);
      const itemLabel = findItemName(itemId, bids[0]);
      html += `<div class="bid-item" style="flex-wrap:wrap;gap:4px">
        <span style="font-weight:700;flex:1">${itemLabel}(${
          bids.map((b,i)=>{ const m=getMember(b.memberId); return (m?mName(m,'short'):'?')+(i+1); }).join('/')
        })</span>
        <div style="display:flex;gap:4px">
          ${bids.map(b=>{
            const m=getMember(b.memberId);
            return `<button class="btn btn-gray btn-sm" style="font-size:.65rem;padding:3px 7px" onclick="editBidModal('${b.id}')">✏️${m?mName(m,'short'):'?'}</button>`;
          }).join('')}
        </div>
      </div>`;
    });
  }
  html += '</div>';

  // --- Remaining (only if current session has items loaded) ---
  if (S.items.length) {
    const remParts = S.items.map(item => {
      const claimed = sesBids.filter(b=>b.itemId===item.id).length;
      const rem = item.qty - claimed;
      if (rem<=0) return '';
      const nums = Array.from({length:rem},(_,i)=>claimed+i+1);
      if (nums.length>4) return `${iName(item,'short')}(${nums[0]}到${nums[nums.length-1]})`;
      return `${iName(item,'short')}(${nums.join('/')})`;
    }).filter(Boolean);
    html += `<div class="card"><div class="card-title">📦 剩餘名額</div>
      <div class="output-box" id="remBox0">${remParts.length?'還剩 '+remParts.join('。'):'所有物品已競標完畢 🎉'}</div>
      <button class="copy-btn" onclick="copyEl('remBox0',this)">📋 複製剩餘名額</button>
    </div>`;
  }

  // --- Priority (based on selected date only) ---
  if ((ses==='evening'||ses==='king') && S.members.length) {
    html += renderPrioritySection(ses, selDate);
  }

  el.innerHTML = html;
  renderCDSection();
}

function renderCDSection() {
  const el = document.getElementById('cdSection');
  if (!el) return;
  const allCdBids = S.bids.filter(b=>b.hasCD && cdDaysLeft(b)>0);
  if (!allCdBids.length) { el.innerHTML=''; return; }

  const deduped = {};
  allCdBids.forEach(bid => {
    const left = cdDaysLeft(bid);
    if (!deduped[bid.memberId] || left > deduped[bid.memberId].left)
      deduped[bid.memberId] = {bid, left};
  });
  const groups = {};
  Object.values(deduped).forEach(({bid, left}) => {
    const dateKey = unlockDate(bid);
    if (!groups[dateKey]) groups[dateKey] = {left, members:[]};
    const m = getMember(bid.memberId);
    groups[dateKey].members.push(m ? mName(m,'short') : '?');
  });
  const sortedKeys = Object.keys(groups).sort((a,b) => groups[a].left - groups[b].left);

  let html = `<div class="card"><div class="card-title">⏳ CD解禁日期</div>
    <div style="display:grid;grid-template-columns:repeat(${Math.min(sortedKeys.length,3)},1fr);gap:8px">`;
  sortedKeys.forEach(dateKey => {
    const {left, members} = groups[dateKey];
    const copyText = `${dateKey}解禁 ${members.join(' ')}`;
    const boxId = `cdGroup_${dateKey.replace('/','_')}`;
    html += `<div style="background:var(--bg);border:1.5px solid var(--orange-bd);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:.72rem;font-weight:900;color:var(--orange);text-align:center">${left}天後 (${dateKey})</div>
      <div id="${boxId}" style="font-size:.75rem;line-height:1.6;word-break:break-all;flex:1">${copyText}</div>
      <button class="copy-btn" style="font-size:.72rem;padding:6px;margin:0" onclick="copyEl('${boxId}',this)">📋 複製</button>
    </div>`;
  });
  html += `</div></div>`;
  el.innerHTML = html;
}

function renderPrioritySection(ses, selDate) {
  const noonBidderIds = new Set(S.bids.filter(b=>b.session==='noon'&&b.date===selDate).map(b=>b.memberId));
  const eveningBidderIds = new Set(S.bids.filter(b=>b.session==='evening'&&b.date===selDate).map(b=>b.memberId));

  let r1=[], r2=[], desc1='', desc2='';

  if (ses==='evening') {
    // R2 = anyone who bid in noon (regardless of evening status)
    // R1 = everyone else (didn't bid in noon)
    desc1 = '中午未競標';
    desc2 = '中午有競標過';
    S.members.forEach(m => {
      if (noonBidderIds.has(m.id)) r2.push(m);
      else r1.push(m);
    });
  } else if (ses==='king') {
    // R1 = didn't bid in noon OR evening
    // R2 = bid in noon OR evening
    desc1 = '中午/晚上都未競標';
    desc2 = '中午或晚上有競標過';
    S.members.forEach(m => {
      const hasBid = noonBidderIds.has(m.id) || eveningBidderIds.has(m.id);
      if (!hasBid) r1.push(m); else r2.push(m);
    });
  }

  const chips = (arr, cls) => arr.map(m=>`<span class="m-chip ${cls}">${mName(m,'short')}</span>`).join('');
  const r1Text = r1.map(m=>mName(m,'short')).join(' ');
  const r2Text = r2.map(m=>mName(m,'short')).join(' ');
  const r1Id = 'pr1_'+ses;
  const r2Id = 'pr2_'+ses;

  return `<div class="card">
    <div class="card-title">🏆 競標優先順序</div>
    <div class="priority-section">
      <div class="priority-title" style="color:var(--gold)">🥇 第一輪（優先） <span style="font-size:.68rem;font-weight:400;color:var(--text3)">${desc1}</span> <span style="font-size:.68rem;font-weight:700">${r1.length}人</span></div>
      <div class="member-chips-wrap" style="margin-bottom:8px">${r1.length?chips(r1,'r1'):'<span style="color:var(--text3);font-size:.75rem">無</span>'}</div>
      ${r1.length?`<div class="output-box" id="${r1Id}" style="font-size:.78rem;padding:8px 10px;margin-bottom:4px">${r1Text}</div>
      <button class="copy-btn" style="margin-bottom:0" onclick="copyEl('${r1Id}',this)">📋 複製第一輪名單</button>`:''}
    </div>
    <div class="priority-section" style="margin-top:10px">
      <div class="priority-title" style="color:var(--purple)">🥈 第二輪 <span style="font-size:.68rem;font-weight:400;color:var(--text3)">${desc2}</span> <span style="font-size:.68rem;font-weight:700">${r2.length}人</span></div>
      <div class="member-chips-wrap" style="margin-bottom:8px">${r2.length?chips(r2,'r2'):'<span style="color:var(--text3);font-size:.75rem">無</span>'}</div>
      ${r2.length?`<div class="output-box" id="${r2Id}" style="font-size:.78rem;padding:8px 10px;margin-bottom:4px">${r2Text}</div>
      <button class="copy-btn" style="margin-bottom:0" onclick="copyEl('${r2Id}',this)">📋 複製第二輪名單</button>`:''}
    </div>
  </div>`;
}

// ===== OUTPUT PAGE =====
function getLabel(item) { return iName(item,'output'); }
function getMLabel(m) { return mName(m,'output'); }

function buildText(ses) {
  const bids = ses ? S.bids.filter(b=>b.session===ses) : S.bids;
  return S.items.map(item => {
    const ib = [...bids.filter(b=>b.itemId===item.id)].sort((a,b)=>a.ts-b.ts);
    if (!ib.length) return '';
    const names = ib.map((b,i)=>{ const m=getMember(b.memberId); return (m?getMLabel(m):'?')+(i+1); });
    return `${getLabel(item)}(${names.join('/')})`;
  }).filter(Boolean).join(' ') || '（尚無競標紀錄）';
}

function buildLootList() {
  if (!S.items.length) return '（尚未解析戰利品）';
  return S.items.map(i=>`${getLabel(i)} ${i.qty}`).join('。')+'。';
}

function buildRemaining() {
  const parts = S.items.map(item => {
    const c = S.bids.filter(b=>b.itemId===item.id).length;
    const r = item.qty - c;
    if (r<=0) return '';
    const nums = Array.from({length:r},(_,i)=>c+i+1);
    if (nums.length>4) return `${getLabel(item)}(${nums[0]}到${nums[nums.length-1]})`;
    return `${getLabel(item)}(${nums.join('/')})`;
  }).filter(Boolean);
  return parts.length ? '還剩 '+parts.join('。') : '所有物品已競標完畢 🎉';
}

function buildCDUnlock() {
  const cdBids = S.bids.filter(b=>b.hasCD);
  if (!cdBids.length) return '（無CD紀錄）';
  const deduped = {};
  cdBids.forEach(bid => {
    const left = cdDaysLeft(bid);
    if (!deduped[bid.memberId] || left > deduped[bid.memberId].left)
      deduped[bid.memberId] = {bid, left};
  });
  const active = Object.values(deduped).filter(x=>x.left>0).sort((a,b)=>a.left-b.left);
  if (!active.length) return '（所有CD已解禁）';
  return active.map(({bid}) => {
    const m = getMember(bid.memberId);
    return `${m?getMLabel(m):'?'}(${unlockDate(bid)})`;
  }).join(' ');
}

function copyEl(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 已複製！'; btn.className='copy-btn copied';
    setTimeout(()=>{ btn.innerHTML=orig; btn.className='copy-btn'; }, 2000);
  });
}

// ===== LOG (3-session summary) =====
function renderLog() {
  const el = document.getElementById('logContent');
  if (!el) return;
  if (!S.bids.length && !S.items.length) {
    el.innerHTML = '<div class="empty">尚無競標紀錄</div>'; return;
  }

  const sessions = [
    {key:'noon', label:'☀️ 中午場'},
    {key:'evening', label:'🌙 晚上場'},
    {key:'king', label:'👑 聯盟王拍賣'},
  ];

  let html = '';

  sessions.forEach(({key, label}) => {
    const sesBids = S.bids.filter(b=>b.session===key);
    if (!sesBids.length) return;

    // Group by itemId, use stored name from bid
    const byItem = {};
    sesBids.forEach(b => {
      if (!byItem[b.itemId]) byItem[b.itemId] = {name: b.itemShort||b.itemName||'?', bids:[]};
      byItem[b.itemId].bids.push(b);
    });
    const resultText = Object.values(byItem).map(({name, bids}) => {
      bids.sort((a,b)=>a.ts-b.ts);
      const names = bids.map((b,i)=>{ const m=getMember(b.memberId); return (m?getMLabel(m):'?')+(i+1); });
      return `${name}(${names.join('/')})`;
    }).join(' ') || '（尚無競標紀錄）';

    const boxId = `log_${key}`;
    html += `<div class="sec-label">${label}</div>
      <div class="output-box" id="${boxId}">${resultText}</div>
      <button class="copy-btn" onclick="copyEl('${boxId}',this)">📋 複製${label}結果</button>`;
  });

  // Remaining
  const remParts = S.items.map(item => {
    const c = S.bids.filter(b=>b.itemId===item.id).length;
    const r = item.qty - c;
    if (r<=0) return '';
    const nums = Array.from({length:r},(_,i)=>c+i+1);
    if (nums.length>4) return `${getLabel(item)}(${nums[0]}到${nums[nums.length-1]})`;
    return `${getLabel(item)}(${nums.join('/')})`;
  }).filter(Boolean);
  const remText = remParts.length ? '還剩 '+remParts.join('。') : '所有物品已競標完畢 🎉';
  html += `<div class="sec-label">📦 目前剩餘名額</div>
    <div class="output-box" id="log_rem">${remText}</div>
    <button class="copy-btn" onclick="copyEl('log_rem',this)">📋 複製剩餘名額</button>`;

  // CD unlock
  const cdText = buildCDUnlock();
  html += `<div class="sec-label">⏳ CD解禁日期</div>
    <div class="output-box" id="log_cd">${cdText}</div>
    <button class="copy-btn" onclick="copyEl('log_cd',this)">📋 複製CD名單</button>`;

  el.innerHTML = html || '<div class="empty">尚無競標紀錄</div>';
}

// ===== CD =====
function renderCD() {
  const el = document.getElementById('cdContent');
  const cdBids = S.bids.filter(b=>b.hasCD);
  if (!cdBids.length) { el.innerHTML='<div class="empty">目前無CD競標紀錄</div>'; return; }
  const active = cdBids.filter(b=>cdDaysLeft(b)>0).sort((a,b)=>cdDaysLeft(b)-cdDaysLeft(a));
  const done = cdBids.filter(b=>cdDaysLeft(b)===0);
  let html='';
  if (active.length) {
    html+='<div class="sec-label">🔴 CD冷卻中</div>';
    active.forEach(bid=>{
      const m=getMember(bid.memberId), item=S.items.find(i=>i.id===bid.itemId);
      const eff=effectiveCDDays(bid), itemDays=bid.cdDays||3;
      const grp=m?.groupId?S.groups.find(g=>g.id===m.groupId):null;
      const note=grp&&grp.cdDays<itemDays?`<span style="color:var(--purple);font-size:.68rem"> · 群組${grp.cdDays}天</span>`:'';
      html+=`<div class="cd-row active">
        <div>
          <div style="font-weight:700">${m?.name||'?'}</div>
          <div style="font-size:.7rem;color:var(--text3)">${item?.name||'?'} · 物品${itemDays}天${note} · 實際${eff}天 · ${bid.date}</div>
        </div>
        <div class="cd-days">${cdDaysLeft(bid)}天</div>
      </div>`;
    });
  }
  if (done.length) {
    html+='<div class="sec-label" style="margin-top:12px">✅ CD結束</div>';
    done.forEach(bid=>{
      const m=getMember(bid.memberId), item=S.items.find(i=>i.id===bid.itemId);
      html+=`<div class="cd-row done">
        <div><div style="font-weight:700">${m?.name||'?'}</div>
        <div style="font-size:.7rem;color:var(--text3)">${item?.name||'?'}</div></div>
        <div class="cd-days done">✅ 可再標</div>
      </div>`;
    });
  }
  el.innerHTML=`<div class="card">${html}</div>`;
}

function addItem() {
  const name=document.getElementById('niName').value.trim();
  if (!name) { alert('請輸入名稱'); return; }
  if (S.itemDB.find(i=>i.name===name)) { alert('名稱已存在'); return; }
  const short=document.getElementById('niShort').value.trim();
  const tier=document.getElementById('niTier').value;
  const hasCD=document.getElementById('niCD').checked;
  const cdDays=hasCD?(parseInt(document.getElementById('niCDDays').value)||3):3;
  S.itemDB.push({id:uid(), name, shortName:short||name, tier, perMemberLimit:tier==='purple'?1:2, hasCD, cdDays});
  document.getElementById('niName').value=''; document.getElementById('niShort').value='';
  document.getElementById('niCD').checked=false; toggleNiCD();
  save(); renderSettings();
}

function removeItem(id) {
  if (!confirm('確認從資料庫刪除？')) return;
  S.itemDB=S.itemDB.filter(i=>i.id!==id);
  S.items=S.items.filter(i=>i.dbId!==id&&i.id!==id);
  S.bids=S.bids.filter(b=>b.itemId!==id);
  if (selectedItemId===id) selectedItemId=null;
  save(); renderSettings(); renderLootGrid();
}

function openEditItemModal(id) {
  const item=S.itemDB.find(i=>i.id===id);
  if (!item) return;
  document.getElementById('eiName').value=item.name;
  document.getElementById('eiShort').value=(item.shortName&&item.shortName!==item.name)?item.shortName:'';
  document.getElementById('eiTier').value=item.tier||'blue';
  document.getElementById('eiCD').checked=item.hasCD||false;
  document.getElementById('eiCDDays').value=item.cdDays||3;
  toggleEiCD();
  document.getElementById('editItemModal')._id=id;
  document.getElementById('editItemModal').style.display='flex';
}
function closeEditItemModal() { document.getElementById('editItemModal').style.display='none'; }
function confirmEditItem() {
  const id=document.getElementById('editItemModal')._id;
  const item=S.itemDB.find(i=>i.id===id); if (!item) return;
  const name=document.getElementById('eiName').value.trim();
  if (!name) { alert('名稱不能為空'); return; }
  if (name!==item.name&&S.itemDB.find(i=>i.name===name)) { alert('名稱已存在'); return; }
  const short=document.getElementById('eiShort').value.trim();
  const tier=document.getElementById('eiTier').value;
  const hasCD=document.getElementById('eiCD').checked;
  const cdDays=hasCD?(parseInt(document.getElementById('eiCDDays').value)||3):3;
  Object.assign(item,{name, shortName:short||name, tier, perMemberLimit:tier==='purple'?1:2, hasCD, cdDays});
  S.items.filter(i=>i.dbId===id).forEach(i=>Object.assign(i,{name,shortName:item.shortName,tier,perMemberLimit:item.perMemberLimit,hasCD,cdDays}));
  closeEditItemModal(); save(); renderSettings(); renderLootGrid();
}

function addGroup() {
  const name=document.getElementById('ngName').value.trim();
  const cdDays=parseInt(document.getElementById('ngCD').value)||3;
  if (!name) return;
  if (S.groups.find(g=>g.name===name)) { alert('群組已存在'); return; }
  S.groups.push({id:uid(),name,cdDays});
  document.getElementById('ngName').value='';
  save(); renderSettings(); updateGroupSelects();
}
function removeGroup(id) {
  if (!confirm('刪除群組？成員將改為無群組。')) return;
  S.groups=S.groups.filter(g=>g.id!==id);
  S.members.forEach(m=>{ if(m.groupId===id) m.groupId=null; });
  save(); renderSettings(); updateGroupSelects();
}
function editGroupCD(id) {
  const g=S.groups.find(g=>g.id===id); if (!g) return;
  document.getElementById('groupCDInfo').innerHTML=`群組：<strong>${g.name}</strong>`;
  document.getElementById('groupCDInput').value=g.cdDays;
  document.getElementById('groupCDModal')._id=id;
  document.getElementById('groupCDModal').style.display='flex';
}
function confirmGroupCD() {
  const id=document.getElementById('groupCDModal')._id;
  const g=S.groups.find(g=>g.id===id); if (!g) return;
  const d=parseInt(document.getElementById('groupCDInput').value);
  if (isNaN(d)||d<1) { alert('請輸入有效天數'); return; }
  g.cdDays=d; document.getElementById('groupCDModal').style.display='none';
  save(); renderSettings();
}

function updateGroupSelects() {
  ['nmGroup','memberGroupSelect'].forEach(id=>{
    const sel=document.getElementById(id); if (!sel) return;
    const cur=sel.value;
    sel.innerHTML=`<option value="">無群組</option>`+
      S.groups.map(g=>`<option value="${g.id}">${g.name}（CD ${g.cdDays}天）</option>`).join('');
    if ([...sel.options].some(o=>o.value===cur)) sel.value=cur;
  });
  // update filter select
  const fs=document.getElementById('memberFilter');
  if (fs) {
    const cur=fs.value;
    fs.innerHTML=`<option value="all">全部成員</option><option value="none">無群組</option>`+
      S.groups.map(g=>`<option value="${g.id}">${g.name}（${S.members.filter(m=>m.groupId===g.id).length}人）</option>`).join('');
    if ([...fs.options].some(o=>o.value===cur)) fs.value=cur;
  }
}

function addMember() {
  const name=document.getElementById('nmName').value.trim();
  if (!name) return;
  if (S.members.find(m=>m.name===name)) { alert('名稱已存在'); return; }
  const short=document.getElementById('nmShort').value.trim();
  const groupId=document.getElementById('nmGroup').value||null;
  S.members.push({id:uid(),name,shortName:short||name,groupId});
  document.getElementById('nmName').value=''; document.getElementById('nmShort').value='';
  save(); renderSettings(); renderMemberGrid();
}
function removeMember(id) {
  S.members=S.members.filter(m=>m.id!==id);
  save(); renderSettings(); renderMemberGrid();
}
function editMemberGroup(id) {
  const m=getMember(id); if (!m) return;
  document.getElementById('memberGroupInfo').innerHTML=`成員：<strong>${m.name}</strong>`;
  const sel=document.getElementById('memberGroupSelect');
  sel.innerHTML=`<option value="">無群組</option>`+
    S.groups.map(g=>`<option value="${g.id}">${g.name}（CD ${g.cdDays}天）</option>`).join('');
  sel.value=m.groupId||'';
  document.getElementById('memberGroupModal')._id=id;
  document.getElementById('memberGroupModal').style.display='flex';
}
function confirmMemberGroup() {
  const id=document.getElementById('memberGroupModal')._id;
  const m=getMember(id); if (!m) return;
  m.groupId=document.getElementById('memberGroupSelect').value||null;
  document.getElementById('memberGroupModal').style.display='none';
  save(); renderSettings(); renderMemberGrid();
}
function openRenameModal(id) {
  const m=getMember(id); if (!m) return;
  document.getElementById('renameInfo').innerHTML=`目前名稱：<strong>${m.name}</strong>`;
  document.getElementById('renameInput').value=m.name;
  document.getElementById('renameShortInput').value=(m.shortName&&m.shortName!==m.name)?m.shortName:'';
  document.getElementById('renameModal')._id=id;
  document.getElementById('renameModal').style.display='flex';
}
function confirmRename() {
  const id=document.getElementById('renameModal')._id;
  const m=getMember(id); if (!m) return;
  const name=document.getElementById('renameInput').value.trim();
  const short=document.getElementById('renameShortInput').value.trim();
  if (!name) { alert('名稱不能為空'); return; }
  if (name!==m.name&&S.members.find(x=>x.name===name)) { alert('名稱已存在'); return; }
  m.name=name; m.shortName=short||name;
  document.getElementById('renameModal').style.display='none';
  save(); renderSettings(); renderMemberGrid();
}

function renderMemberManageList() {
  const filter=document.getElementById('memberFilter')?.value||'all';
  let filtered=S.members;
  if (filter==='none') filtered=S.members.filter(m=>!m.groupId);
  else if (filter!=='all') filtered=S.members.filter(m=>m.groupId===filter);
  const cEl=document.getElementById('memberFilterCount');
  if (cEl) cEl.textContent=filter==='all'?'':`${filtered.length}人`;
  document.getElementById('memberManageList').innerHTML=filtered.length?filtered.map(m=>{
    const grp=m.groupId?S.groups.find(g=>g.id===m.groupId):null;
    const grpLabel=grp?`<span class="pill pill-purple" style="font-size:.6rem">${grp.name}</span>`:`<span style="font-size:.65rem;color:var(--text3)">無群組</span>`;
    const hasShort=m.shortName&&m.shortName!==m.name;
    return `<div class="manage-row" style="flex-wrap:wrap;gap:4px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:.82rem">${m.name}&nbsp;${grpLabel}</div>
        ${hasShort?`<div style="font-size:.68rem;color:var(--text3)">簡稱：${m.shortName}</div>`:''}
      </div>
      <button class="btn btn-gray btn-sm" style="margin-right:4px" onclick="openRenameModal('${m.id}')">改名</button>
      <button class="btn btn-gray btn-sm" style="margin-right:4px" onclick="editMemberGroup('${m.id}')">群組</button>
      <button class="btn btn-red btn-sm" onclick="removeMember('${m.id}')">移除</button>
    </div>`;
  }).join(''):'<div class="empty" style="padding:12px 0">無符合成員</div>';
}

function renderSettings() {
  // Items
  const il=document.getElementById('itemManageList');
  il.innerHTML=S.itemDB.length?S.itemDB.map(item=>{
    const tierLabel=item.tier==='purple'?'<span class="pill pill-purple" style="font-size:.6rem">🟣 紫</span>':'<span class="pill pill-blue" style="font-size:.6rem">🔵 藍</span>';
    const cdLabel=item.hasCD?` <span class="pill pill-cd" style="font-size:.6rem">CD ${item.cdDays}天</span>`:'';
    const hasShort=item.shortName&&item.shortName!==item.name;
    return `<div class="manage-row" style="flex-wrap:wrap;gap:4px;align-items:flex-start">
      <div style="flex:1;min-width:100px">
        <div style="font-weight:700;font-size:.82rem">${item.name} ${tierLabel}${cdLabel}</div>
        ${hasShort?`<div style="font-size:.68rem;color:var(--text3)">簡稱：${item.shortName}</div>`:''}
      </div>
      <button class="btn btn-gray btn-sm" onclick="openEditItemModal('${item.id}')">編輯</button>
      <button class="btn btn-red btn-sm" onclick="removeItem('${item.id}')">刪除</button>
    </div>`;
  }).join(''):'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:10px 0">尚無戰利品（設定後永久保存）</div>';

  // Groups
  const gl=document.getElementById('groupManageList');
  gl.innerHTML=S.groups.length?S.groups.map(g=>{
    const cnt=S.members.filter(m=>m.groupId===g.id).length;
    return `<div class="manage-row">
      <div style="flex:1"><span style="font-weight:700">${g.name}</span> <span style="font-size:.72rem;color:var(--text3)">${cnt}人</span></div>
      <span class="pill pill-cd" style="font-size:.65rem;margin-right:6px">CD ${g.cdDays}天</span>
      <button class="btn btn-gray btn-sm" style="margin-right:4px" onclick="editGroupCD('${g.id}')">修改天數</button>
      <button class="btn btn-red btn-sm" onclick="removeGroup('${g.id}')">刪除</button>
    </div>`;
  }).join(''):'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:8px 0">尚無群組</div>';

  document.getElementById('memberCountBadge').textContent=`${S.members.length}人`;
  updateGroupSelects();
  renderMemberManageList();
}

function clearSessionBids(ses) {
  const labels = {noon:'中午場', evening:'晚上場', king:'聯盟王拍賣'};
  if (!confirm(`確認清除${labels[ses]||ses}的所有競標紀錄？`)) return;
  S.bids = S.bids.filter(b => b.session !== ses);
  save(); renderAll();
}
function clearSession() {
  if (!confirm('確認重置場次資料？（戰利品資料庫和成員設定保留）')) return;
  S.bids=[]; S.sessionItems={}; S.pasteTexts={};
  S.session=null; S.items=[]; selectedItemId=null; viewSession=null;
  document.getElementById('lootSection').style.display='none';
  document.getElementById('pasteInput').value='';
  save(); renderAll();
}
function resetAll() {
  if (!confirm('⚠️ 完全重置所有資料？')) return;
  S={itemDB:[],items:[],sessionItems:{},pasteTexts:{},
    members:[],bids:[],session:null,groups:[],notes:''};
  selectedItemId=null; viewSession=null;
  document.getElementById('lootSection').style.display='none';
  document.getElementById('pasteInput').value='';
  save(); renderAll();
}

// ===== NOTES =====
let notesTimer=null;
function saveNotes() {
  S.notes=document.getElementById('notesArea')?.value||'';
  if (notesTimer) clearTimeout(notesTimer);
  notesTimer=setTimeout(()=>save(), 1000);
}

// ===== EDIT BID =====
function editBidModal(bidId) {
  const bid = S.bids.find(b=>b.id===bidId);
  if (!bid) return;
  const item = (() => {
    const si = S.items.find(i=>i.id===bid.itemId);
    if (si) return si;
    for (const key of Object.keys(S.sessionItems)) {
      const fi = (S.sessionItems[key]||[]).find(i=>i.id===bid.itemId);
      if (fi) return fi;
    }
    return null;
  })();
  const itemName = bid.itemShort || bid.itemName || item?.shortName || item?.name || '?';
  const m = getMember(bid.memberId);
  document.getElementById('editBidInfo').innerHTML =
    `物品：<strong>${itemName}</strong><br>目前成員：<strong>${m?.name||'?'}</strong>`;
  // Populate member select
  const sel = document.getElementById('editBidMember');
  sel.innerHTML = S.members.map(mem=>
    `<option value="${mem.id}" ${mem.id===bid.memberId?'selected':''}>${mem.name}${mem.shortName&&mem.shortName!==mem.name?' ('+mem.shortName+')':''}</option>`
  ).join('');
  document.getElementById('editBidDate').value = bid.date;
  document.getElementById('editBidModal')._bidId = bidId;
  document.getElementById('editBidModal').style.display = 'flex';
}

function closeEditBidModal() {
  document.getElementById('editBidModal').style.display = 'none';
}

function confirmEditBid() {
  const bidId = document.getElementById('editBidModal')._bidId;
  const bid = S.bids.find(b=>b.id===bidId);
  if (!bid) return;
  bid.memberId = document.getElementById('editBidMember').value;
  bid.date = document.getElementById('editBidDate').value;
  closeEditBidModal();
  save(); renderLootGrid(); renderMemberGrid(); renderSessionResults(); renderCDSection();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
}

function deleteBidFromModal() {
  const bidId = document.getElementById('editBidModal')._bidId;
  if (!confirm('確認刪除這筆競標紀錄？')) return;
  S.bids = S.bids.filter(b=>b.id!==bidId);
  closeEditBidModal();
  save(); renderLootGrid(); renderMemberGrid(); renderSessionResults(); renderCDSection();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
}

// ===== RENDER ALL =====
function renderAll() {
  syncSessionItems();
  const ses = viewSession || S.session || 'noon';
  const key = getDateSesKey(selectedDate, ses);
  const hasItems = (S.sessionItems[key]||[]).length > 0;
  if (hasItems) document.getElementById('lootSection').style.display='';
  if (S.session) updateSessionUI(S.session);
  if (!viewSession) viewSession = S.session || 'noon';

  // Keep date display in sync
  const dispEl = document.getElementById('sessionDateDisplay');
  if (dispEl) dispEl.textContent = formatDateDisplay(selectedDate);

  // Sync paste text for current date+session
  const pasteEl = document.getElementById('pasteInput');
  if (pasteEl && document.activeElement !== pasteEl) {
    pasteEl.value = S.pasteTexts[key] || '';
  }

  const notesEl = document.getElementById('notesArea');
  if (notesEl && document.activeElement !== notesEl) notesEl.value = S.notes || '';

  renderLootGrid(); renderMemberGrid(); renderSessionResults(); renderCDSection();
  if (currentTab===1) renderLog();
  if (currentTab===2) renderCD();
  if (currentTab===3) renderSettings();
}
</script>
</body>
</html>
